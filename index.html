<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación SAMU - Modo Oscuro</title>
    <style>
        :root { --primary: #d63031; --secondary: #121212; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            /* Fondo con imagen local y capa oscura */
            background-image: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), 
                              url('fondo.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff; 
            line-height: 1.6; 
            padding: 40px 20px; 
            margin: 0;
        }

        .container { 
            max-width: 700px; 
            margin: 0 auto; 
            background: rgba(25, 25, 25, 0.95); 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.8); 
            border-top: 8px solid var(--primary); 
        }

        h1 { text-align: center; color: var(--primary); text-transform: uppercase; margin-bottom: 30px; font-size: 2rem; letter-spacing: 2px; }
        h3 { background: var(--primary); color: white; padding: 12px; border-radius: 5px; margin-top: 35px; font-size: 1.1rem; text-transform: uppercase; }
        
        .field { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 10px; font-size: 0.95rem; color: #e0e0e0; }
        
        /* Cajas de escritura NEGRAS */
        input[type="text"], textarea, select { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #333; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 1rem;
            background-color: #000000; 
            color: #ffffff; 
            transition: all 0.3s ease;
        }

        /* Efecto al hacer clic en las casillas */
        input:focus, textarea:focus, select:focus { 
            border-color: var(--primary); 
            outline: none; 
            background-color: #111; 
            box-shadow: 0 0 10px rgba(214, 48, 49, 0.4);
        }

        textarea { resize: vertical; min-height: 110px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        button { 
            width: 100%; 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 20px; 
            border-radius: 8px; 
            font-size: 1.2rem; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.4s; 
            margin-top: 30px;
            text-transform: uppercase;
        }
        button:hover { background: #ff4d4d; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(214, 48, 49, 0.4); }

        select option { background: #111; color: white; }

        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <h1>Postulación SAMU</h1>
    
    <!-- ENLACE DIRECTO A TU FORMSPREE -->
    <form action="https://formspree.io/f/mwvyeelw" method="POST">
        
        <h3>1. INFORMACIÓN IC Y OOC</h3>
        <div class="field">
            <label>1.1 Nombre de Discord:</label>
            <input type="text" name="1.1-Discord" placeholder="Usuario#1234" required>
        </div>

        <div class="grid">
            <div class="field">
                <label>1.2 Nombre y edad IC:</label>
                <input type="text" name="1.2-Nombre-IC" required>
            </div>
            <div class="field">
                <label>1.3 Nombre y edad OOC:</label>
                <input type="text" name="1.3-Nombre-OOC" required>
            </div>
        </div>

        <div class="field">
            <label>1.4 Disponibilidad horaria:</label>
            <input type="text" name="1.4-Horarios" required>
        </div>

        <div class="field">
            <label>1.5 ¿Experiencia previa en SAMU o facciones?</label>
            <textarea name="1.5-Experiencia"></textarea>
        </div>

        <div class="field">
            <label>1.6 ¿Nivel de RP?</label>
            <select name="1.6-Nivel-RP">
                <option value="bajo">Bajo</option>
                <option value="medio">Medio</option>
                <option value="alto" selected>Alto</option>
            </select>
        </div>

        <div class="field">
            <label>1.7 Explica: MetaGaming, PowerGaming y Fail RP:</label>
            <textarea name="1.7-Conceptos-Rol" required></textarea>
        </div>

        <h3>2. CONOCIMIENTO DE ROL Y PROCEDIMIENTOS</h3>
        <div class="field">
            <label>2.1 Herido de bala y pulsaciones bajas (/me y /do):</label>
            <textarea name="2.1-Procedimiento-Bala" required></textarea>
        </div>

        <div class="field">
            <label>2.2 ¿Puedes hacer actos delictuales siendo SAMU?</label>
            <input type="text" name="2.2-Actos-Delictuales" required>
        </div>

        <div class="field">
            <label>2.3 Tiroteo con heridos y alguien disparando ¿Qué haces?</label>
            <textarea name="2.3-Situacion-Tiroteo" required></textarea>
        </div>

        <div class="field">
            <label>2.4 Estás solo, prioridad entre gente y llamados:</label>
            <textarea name="2.4-Prioridad-Solo" required></textarea>
        </div>

        <div class="field">
            <label>2.5 Civiles y Carabineros abatidos ¿Cómo reaccionas?</label>
            <textarea name="2.5-Reaccion-Abatidos" required></textarea>
        </div>

        <h3>3. COMPROMISO SAMU</h3>
        <div class="field">
            <label>3.1 ¿Por qué quieres entrar a SAMU?</label>
            <textarea name="3.1-Porque-Entrar" required></textarea>
        </div>

        <div class="field">
            <label>3.2 ¿Qué puedes aportar al equipo?</label>
            <textarea name="3.2-Aporte" required></textarea>
        </div>

        <div class="field">
            <label>3.3 ¿Dispuesto a seguir órdenes y jerarquías?</label>
            <select name="3.3-Respeto-Jerarquia">
                <option value="si">Sí, totalmente</option>
                <option value="no">No</option>
            </select>
        </div>

        <button type="submit">Enviar Postulación a Jefatura</button>
    </form>
</div>

</body>
</html>
