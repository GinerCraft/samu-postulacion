<!DOCTYPE html>
<html>
<head>
  <title>Postulación SAMU</title>

  <style>
    body {
      background: linear-gradient(#020617, #0f172a);
      font-family: Arial;
      color: white;
      text-align: center;
    }

    h1 {
      color: #22c55e;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
    }

    input, textarea, select {
      width: 90%;
      padding: 10px;
      margin: 8px;
      border-radius: 8px;
      border: none;
    }

    textarea {
      height: 80px;
    }

    button {
      background: #22c55e;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      width: 50%;
      font-size: 16px;
    }

    button:hover {
      background: #16a34a;
    }

    .section {
      margin-top: 25px;
      border-top: 1px solid #334155;
      padding-top: 15px;
    }
  </style>
</head>

<body>

<h1>🚑 Postulación SAMU</h1>

<div class="container">

<form action="https://formspree.io/f/mwvyeelw" method="POST">

<!-- SECCIÓN 1 -->
<div class="section">
<h2>1. Información IC y OOC</h2>

<input name="discord" placeholder="1.1 Nombre de Discord" required>
<input name="nombre_ic" placeholder="1.2 Nombre y edad IC" required>
<input name="nombre_ooc" placeholder="1.3 Nombre y edad OOC" required>
<input name="horario" placeholder="1.4 Disponibilidad horaria" required>

<textarea name="experiencia" placeholder="1.5 Experiencia previa en SAMU o facciones"></textarea>

<select name="nivel_rp" required>
  <option value="">1.6 Nivel de RP</option>
  <option>ALTO</option>
  <option>MEDIO</option>
  <option>BAJO</option>
</select>

<textarea name="conceptos" placeholder="1.7 Explica MetaGaming, PowerGaming y Fail RP"></textarea>

</div>

<!-- SECCIÓN 2 -->
<div class="section">
<h2>2. Conocimiento de Rol</h2>

<textarea name="p1" placeholder="2.1 ¿Cómo atenderías a un herido de bala?"></textarea>

<select name="p2">
  <option value="">2.2 ¿Puedes hacer actos delictuales?</option>
  <option>SI</option>
  <option>NO</option>
</select>

<textarea name="p3" placeholder="2.3 Reacción ante tiroteo mientras atiendes"></textarea>

<textarea name="p4" placeholder="2.4 Prioridades siendo el único SAMU"></textarea>

<textarea name="p5" placeholder="2.5 Escenario civiles y carabineros abatidos"></textarea>

</div>

<!-- SECCIÓN 3 -->
<div class="section">
<h2>3. Compromiso</h2>

<textarea name="motivo" placeholder="3.1 ¿Por qué quieres entrar a SAMU?"></textarea>

<textarea name="aporte" placeholder="3.2 ¿Qué puedes aportar?"></textarea>

<select name="ordenes">
  <option value="">3.3 ¿Respetarás jerarquías?</option>
  <option>SI</option>
  <option>NO</option>
</select>

</div>

<br>
<button type="submit">🚑 Enviar Postulación</button>

</form>

</div>

</body>
</html>
